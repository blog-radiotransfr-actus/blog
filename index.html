<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Transfr Blog - Le site officiel</title>
    
    <meta name="description" content="Découvre Transfr Blog ! Retrouve tous mes articles, mes vidéos, mes actus gaming et mes blagues en un seul endroit.">
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f5;
            margin: 0;
            padding: 0;
            color: #333;
        }
        header {
            background: linear-gradient(135deg, #007ecc, #005999);
            color: white;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        header h1 {
            margin: 0;
            font-size: 2.5rem;
            letter-spacing: 1px;
        }
        header p {
            margin: 10px 0 0 0;
            font-size: 1.1rem;
            opacity: 0.9;
        }
        .container {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }
        /* Style de l'article de bienvenue fixe */
        .welcome-post {
            background: #ffffff;
            padding: 25px;
            margin-bottom: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-left: 5px solid #007ecc;
        }
        .welcome-post h2 {
            margin-top: 0;
            color: #005999;
        }
        /* Style des articles avec texte à gauche et vidéo à droite */
        .post {
            background: white;
            padding: 25px;
            margin-bottom: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: row;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap; /* S'adapte si l'écran est petit */
        }
        .post-content {
            flex: 1;
            min-width: 250px;
        }
        .post h2 {
            margin-top: 0;
            color: #007ecc;
        }
        .post p {
            line-height: 1.6;
            color: #555;
            white-space: pre-wrap;
        }
        /* Zone pour la vidéo sur le côté droit */
        .post-media {
            flex: 1;
            min-width: 250px;
            max-width: 400px;
        }
        .post-media video, .post-media iframe {
            width: 100%;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        footer {
            text-align: center;
            padding: 20px;
            color: #777;
            font-size: 0.9rem;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Transfr Blog</h1>
        <p>Bienvenue sur mon site officiel !</p>
    </header>

    <div class="container">
        <div class="welcome-post">
            <h2>Bienvenue sur Transfr Blog !</h2>
            <p>C'est ici que je vais poster toutes les nouveautés, mes articles et mes vidéos. Reste branché !</p>
        </div>

        </div>

    <footer>
        <p>© 2026 Transfr Blog - Tous droits réservés</p>
    </footer>

</body>
</html>
