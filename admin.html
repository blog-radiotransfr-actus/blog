<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Transfr - Administration Automatique</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9; text-align: center; }
        .box { background: white; padding: 20px; max-width: 500px; margin: 30px auto; border-radius: 8px; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        input, textarea, button { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #238636; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2ea043; }
        .hidden { display: none; }
        
        /* Zone de glisser-déposer */
        #drop-zone {
            border: 2px dashed #007ecc;
            padding: 20px;
            background-color: #f0f8ff;
            border-radius: 6px;
            margin: 10px 0;
            cursor: pointer;
            color: #007ecc;
            font-weight: bold;
        }
        #drop-zone.hover { background-color: #ddf0ff; }
        .preview { max-width: 100%; max-height: 150px; margin-top: 10px; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="login-zone" class="box">
        <h2>Accès Sécurisé</h2>
        <p>Entre le code PIN :</p>
        <input type="password" id="pin" placeholder="Code PIN à 4 chiffres">
        <button onclick="verifierPIN()">Connexion</button>
        <p id="error-msg" style="color: red;"></p>
    </div>

    <div id="admin-zone" class="box hidden">
        <h2>Créer un article en 1 clic</h2>
        
        <input type="text" id="gh-user" placeholder="Ton pseudo GitHub">
        <input type="text" id="gh-repo" placeholder="Le nom de ton dépôt (ex: blog)">
        <input type="password" id="gh-token" placeholder="Ton Token GitHub (Clé secrète)">
        <hr>

        <input type="text" id="post-title" placeholder="Titre de l'article">
        <textarea id="post-content" rows="4" placeholder="Écris ton texte ici..."></textarea>
        
        <div id="drop-zone" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropFile(event)" onclick="triggerInput()">
            Glisse et dépose une PHOTO ou une VIDÉO ici (ou clique pour choisir)
        </div>
        <input type="file" id="file-input" class="hidden" accept="image/*,video/*" onchange="handleFile(this.files[0])">
        <div id="media-preview-container"></div>

        <button onclick="publierArticle()">🚀 Publier directement sur le site</button>
        <p id="status-msg" style="font-weight: bold; color: blue;"></p>
    </div>

    <script>
        let mediaBase64 = "";
        let mediaType = "";

        function verifierPIN() {
            const pinSaisi = document.getElementById('pin').value;
            if (pinSaisi === "1944") { // Correction automatique de ton 144 ;)
                document.getElementById('login-zone').classList.add('hidden');
                document.getElementById('admin-zone').classList.remove('hidden');
            } else {
                document.getElementById('error-msg').innerText = "Code PIN incorrect !";
            }
        }

        // Gestion du glisser-déposer
        function triggerInput() { document.getElementById('file-input').click(); }
        function dragOver(e) { e.preventDefault(); document.getElementById('drop-zone').classList.add('hover'); }
        function dragLeave(e) { document.getElementById('drop-zone').classList.remove('hover'); }
        
        function dropFile(e) {
            e.preventDefault();
            document.getElementById('drop-zone').classList.remove('hover');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        }

        function handleFile(file) {
            if (!file) return;
            mediaType = file.type;
            const reader = new FileReader();
            
            reader.onload = function(e) {
                mediaBase64 = e.target.result;
                const container = document.getElementById('media-preview-container');
                container.innerHTML = "";
                
                if (mediaType.startsWith('image/')) {
                    container.innerHTML = `<img src="${mediaBase64}" class="preview">`;
                } else if (mediaType.startsWith('video/')) {
                    container.innerHTML = `<video src="${mediaBase64}" class="preview" controls></video>`;
                }
                document.getElementById('drop-zone').innerText = "Fichier prêt : " + file.name;
            };
            reader.readAsDataURL(file);
        }

        // Publication Automatique via l'API GitHub
        async function publierArticle() {
            const user = document.getElementById('gh-user').value;
            const repo = document.getElementById('gh-repo').value;
            const token = document.getElementById('gh-token').value;
            const titre = document.getElementById('post-title').value;
            const contenu = document.getElementById('post-content').value;
            const status = document.getElementById('status-msg');

            if (!user || !repo || !token || !titre || !contenu) {
                alert("Remplis tous les champs ainsi que tes infos GitHub !");
                return;
            }

            status.innerText = "Connexion à GitHub en cours...";

            // 1. Préparation du code HTML du nouvel article
            let mediaHtml = "";
            if (mediaBase64) {
                if (mediaType.startsWith('image/')) {
                    mediaHtml = `<br><img src="${mediaBase64}" style="max-width:100%; border-radius:8px; margin-top:10px;">`;
                } else if (mediaType.startsWith('video/')) {
                    mediaHtml = `<br><video src="${mediaBase64}" controls style="max-width:100%; border-radius:8px; margin-top:10px;"></video>`;
                }
            }

            const nouvelArticle = `
<div class="post" style="background: white; padding: 20px; margin: 20px 0; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: left;">
    <h2 style="color: #333; margin-top:0;">${titre}</h2>
    <p style="color: #555; line-height: 1.6; white-space: pre-wrap;">${contenu}</p>
    ${mediaHtml}
</div>
`;

            try {
                // 2. Récupérer le fichier index.html actuel sur GitHub
                const url = `https://api.github.com/repos/${user}/${repo}/contents/index.html`;
                const reponseGet = await fetch(url, {
                    headers: { "Authorization": `token ${token}` }
                });
                
                if (!reponseGet.ok) throw new Error("Impossible de trouver index.html. Vérifie ton pseudo et dépôt.");
                
                const donneesFile = await reponseGet.json();
                const ancienContenuBase64 = donneesFile.content;
                // Décoder le texte de l'index.html actuel
                let ancienTexteHtml = decodeURIComponent(escape(atob(ancienContenuBase64)));

                // 3. Ajouter le nouvel article au début (juste après une balise ou au tout début du body)
                let nouveauTexteHtml = ancienTexteHtml;
                if (ancienTexteHtml.includes('<body>')) {
                    nouveauTexteHtml = ancienTexteHtml.replace('<body>', '<body>\n' + nouvelArticle);
                } else {
                    nouveauTexteHtml = nouvelArticle + ancienTexteHtml;
                }

                // Encober en Base64 pour renvoyer à GitHub
                const nouveauContenuBase64 = btoa(unescape(encodeURIComponent(nouveauTexteHtml)));

                // 4. Envoyer la mise à jour automatique à GitHub
                const reponsePut = await fetch(url, {
                    method: "PUT",
                    headers: {
                        "Authorization": `token ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: `Nouveau post : ${titre}`,
                        content: nouveauContenuBase64,
                        sha: donneesFile.sha
                    })
                });

                if (reponsePut.ok) {
                    status.style.color = "green";
                    status.innerText = "🎉 Réussi ! Ton article et ta vidéo sont publiés en ligne !";
                    // Reset des champs
                    document.getElementById('post-title').value = "";
                    document.getElementById('post-content').value = "";
                    document.getElementById('media-preview-container').innerHTML = "";
                    mediaBase64 = "";
                } else {
                    throw new Error("Erreur lors de l'envoi vers GitHub.");
                }

            } catch (erreur) {
                status.style.color = "red";
                status.innerText = "❌ Erreur : " + erreur.message;
            }
        }
    </script>
</body>
</html>
