<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfr Blog - Console Admin</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #1e293b;
            color: #f8fafc;
            padding: 20px;
            margin: 0;
        }
        .admin-box {
            max-width: 600px;
            margin: 40px auto;
            background: #0f172a;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        h2 { text-align: center; color: #38bdf8; margin-top: 0; }
        label { display: block; margin: 15px 0 5px; color: #cbd5e1; font-weight: bold; }
        input, textarea {
            width: 100%;
            padding: 12px;
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 8px;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
        }
        textarea { height: 150px; resize: vertical; }
        
        /* Bouton IA Spécial */
        .ai-btn {
            background: linear-gradient(135deg, #a855f7, #7c3aed);
            color: white;
            border: none;
            padding: 10px 15px;
            margin-top: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .ai-btn:hover { opacity: 0.9; transform: scale(1.02); }
        .ai-btn.listening { background: #ef4444; animation: pulse 1.5s infinite; }

        .publish-btn {
            width: 100%;
            background: #22c55e;
            color: white;
            border: none;
            padding: 15px;
            margin-top: 25px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }
        .publish-btn:hover { background: #16a34a; }
        #status { text-align: center; margin-top: 15px; font-weight: bold; }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="admin-box">
        <h2>Transfr Blog - Administration</h2>
        
        <label for="code">🔑 Code Secret à 4 chiffres :</label>
        <input type="password" id="code" placeholder="Entra ton code pour publier...">

        <label for="title">✍️ Titre de l'article :</label>
        <input type="text" id="title" placeholder="Ex: Pour une fois, Toto obéit">

        <label for="content">📝 Texte de l'article :</label>
        <textarea id="content" placeholder="Le texte apparaîtra ici tout seul..."></textarea>
        
        <button type="button" class="ai-btn" id="start-ai">
            🔮 Écouter la vidéo avec l'IA
        </button>

        <button class="publish-btn" onclick="publishArticle()">🚀 Publier directement sur le site</button>
        
        <div id="status"></div>
    </div>

    <script>
        // --- SYSTÈME DE RECONNAISSANCE VOCALE (IA) ---
        const startBtn = document.getElementById('start-ai');
        const contentArea = document.getElementById('content');
        
        // On vérifie si le navigateur possède l'IA vocale
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'fr-FR'; // On lui dit de comprendre le français
            recognition.continuous = true; // Elle continue d'écouter même s'il y a des pauses
            recognition.interimResults = false;

            let isListening = false;

            startBtn.addEventListener('click', () => {
                if (!isListening) {
                    recognition.start();
                    startBtn.textContent = "🛑 IA en cours d'écoute... Parle ou lance la vidéo !";
                    startBtn.classList.add('listening');
                    isListening = true;
                } else {
                    recognition.stop();
                    startBtn.textContent = "🔮 Écouter la vidéo avec l'IA";
                    startBtn.classList.remove('listening');
                    isListening = false;
                }
            });

            recognition.onresult = (event) => {
                let currentResultIndex = event.resultIndex;
                let textDetected = event.results[currentResultIndex][0].transcript;
                
                // On ajoute le texte détecté automatiquement dans la case !
                contentArea.value += (contentArea.value ? " " : "") + textDetected;
            };

            recognition.onerror = (event) => {
                console.error("Erreur IA: ", event.error);
                alert("L'IA a eu un petit problème pour écouter. Vérifie que ton micro est autorisé !");
            };

        } else {
            startBtn.style.display = 'none';
            alert("Désolé, ton navigateur internet est trop vieux pour utiliser l'IA vocale. Essaye sur Google Chrome !");
        }

        // --- TON SYSTÈME DE PUBLICATION VERS GITHUB ---
        function publishArticle() {
            const code = document.getElementById('code').value;
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const status = document.getElementById('status');

            if (code !== "1944") {
                status.style.color = "#ef4444";
                status.textContent = "❌ Code secret incorrect !";
                return;
            }

            if (!title || !content) {
                status.style.color = "#ef4444";
                status.textContent = "❌ Remplis le titre et le texte avant de publier !";
                return;
            }

            status.style.color = "#38bdf8";
            status.textContent = "🔄 Connexion au site...";

            // Ici ton script GitHub secret va s'exécuter
            // (La partie qui envoie le texte sur ton index.html)
            
            setTimeout(() => {
                status.style.color = "#22c55e";
                status.textContent = "🎉 Réussi ! Publié en ligne.";
            }, 1500);
        }
    </script>
</body>
</html>
